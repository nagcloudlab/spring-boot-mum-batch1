<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transfer Status</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { background-color: #f0f2f5; }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand navbar-dark bg-dark px-3">
        <a class="navbar-brand fw-bold" href="/"><i class="bi bi-bank2 me-2"></i>Transfer Service</a>
        <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
            <li class="nav-item"><a class="nav-link" href="transfer">Transfer</a></li>
            <li class="nav-item"><a class="nav-link" href="transfer-history">History</a></li>
        </ul>
    </nav>

    <div class="container py-4">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card border-0 shadow-sm">
                    <div class="card-body p-4 text-center">
                        <div class="mb-3">
                            <i class="bi bi-check-circle-fill text-success" style="font-size: 4rem;"
                               th:if="${model.status == 'SUCCESS'}"></i>
                            <i class="bi bi-x-circle-fill text-danger" style="font-size: 4rem;"
                               th:if="${model.status != 'SUCCESS'}"></i>
                        </div>
                        <h4 class="card-title" th:text="${model.status}"></h4>
                        <p class="card-text text-muted fs-5" th:text="${model.message}"></p>
                        <hr>
                        <div class="d-flex justify-content-center gap-3 mt-3">
                            <a href="/transfer" class="btn btn-primary">
                                <i class="bi bi-plus-circle me-1"></i>New Transfer
                            </a>
                            <a href="/transfer-history" class="btn btn-outline-secondary">
                                <i class="bi bi-clock-history me-1"></i>View History
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
