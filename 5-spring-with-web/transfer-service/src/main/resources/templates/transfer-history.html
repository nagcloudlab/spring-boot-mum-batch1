<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transfer History</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { background-color: #f0f2f5; }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand navbar-dark bg-dark px-3">
        <a class="navbar-brand fw-bold" href="/"><i class="bi bi-bank2 me-2"></i>Transfer Service</a>
        <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
            <li class="nav-item"><a class="nav-link" href="transfer">Transfer</a></li>
            <li class="nav-item"><a class="nav-link active" href="transfer-history">History</a></li>
        </ul>
    </nav>

    <div class="container py-4">
        <div class="card border-0 shadow-sm">
            <div class="card-header bg-success text-white d-flex justify-content-between align-items-center">
                <h5 class="mb-0"><i class="bi bi-clock-history me-2"></i>Transfer History</h5>
                <a href="/transfer" class="btn btn-sm btn-light">
                    <i class="bi bi-plus-circle me-1"></i>New Transfer
                </a>
            </div>
            <div class="card-body p-0">
                <table class="table table-striped table-hover mb-0">
                    <thead class="table-light">
                        <tr>
                            <th scope="col">#</th>
                            <th scope="col"><i class="bi bi-box-arrow-right text-danger me-1"></i>From Account</th>
                            <th scope="col"><i class="bi bi-box-arrow-in-right text-success me-1"></i>To Account</th>
                            <th scope="col"><i class="bi bi-currency-rupee text-warning me-1"></i>Amount</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="transfer : ${transferHistory}">
                            <th scope="row" th:text="${transfer.id}"></th>
                            <td><code th:text="${transfer.fromAccountNumber}"></code></td>
                            <td><code th:text="${transfer.toAccountNumber}"></code></td>
                            <td class="fw-bold" th:text="'&#8377; ' + ${transfer.amount}"></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</body>

</html>
