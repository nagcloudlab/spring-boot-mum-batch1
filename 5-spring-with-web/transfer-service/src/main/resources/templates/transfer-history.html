<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>transfer-service</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>

<body>

    <div class="container">
        <div class="display-1">transfer-service</div>
        <hr />
        <a class="btn btn-primary" href="transfer">transfer</a>
        &nbsp;&nbsp;
        <a class="btn btn-primary" href="transfer-history">transfer-history</a>
        <hr />
        <hr />
        <div class="row">
            <div class="col-6">
                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th scope="col">#</th>
                            <th scope="col">From Account</th>
                            <th scope="col">To Account</th>
                            <th scope="col">Amount</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="transfer : ${transferHistory}">
                            <th scope="row" th:text="${transfer.id}"></th>
                            <td th:text="${transfer.fromAccountNumber}"></td>
                            <td th:text="${transfer.toAccountNumber}"></td>
                            <td th:text="'₹ ' + ${transfer.amount}"></td>
                        </tr>
                    </tbody>
            </div>
        </div>

</body>

</html>
