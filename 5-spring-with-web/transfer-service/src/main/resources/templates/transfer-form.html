<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>transfer-service</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>

<body>

    <div class="container">
        <div class="display-1">transfer-service</div>
        <hr />
        <a class="btn btn-primary" href="transfer">transfer</a>
        &nbsp;&nbsp;
        <a class="btn btn-primary" href="transfer-history">transfer-history</a>
        <hr />
        <hr />
        <div class="row">
            <div class="col-6">
                <form action="/transfer" method="post">
                    <div class="mb-3">
                        <label for="fromAccountNumber" class="form-label">From Account</label>
                        <input type="text" class="form-control" id="fromAccountNumber" name="fromAccountNumber"
                            required>
                    </div>
                    <div class="mb-3">
                        <label for="toAccountNumber" class="form-label">To Account</label>
                        <input type="text" class="form-control" id="toAccountNumber" name="toAccountNumber" required>
                    </div>
                    <div class="mb-3">
                        <label for="amount" class="form-label">Amount</label>
                        <input type="number" step="0.01" class="form-control" id="amount" name="amount" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Submit</button>
                </form>
            </div>
        </div>
    </div>

</body>

</html>
